<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #FFD700;
    --neon-green: #00ff66;
    --border: rgba(255,255,255,0.05);
    --text: #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    background: #020602;
    display: flex; justify-content: center; align-items: flex-start;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  #game-wrapper {
    position: relative;
    width: 400px; height: 700px;
    margin-top: max(env(safe-area-inset-top), 10px); 
    transform-origin: top center;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 0 2px rgba(255,255,255,0.05);
    background: #06110a;
  }

  @media (max-height: 720px) { #game-wrapper { transform: scale(0.9); } }
  @media (max-height: 640px) { #game-wrapper { transform: scale(0.8); } }

  #game-canvas { position: absolute; top: 0; left: 0; width: 400px; height: 700px; display: block; }
  #ui-layer { position: absolute; top: 0; left: 0; width: 400px; height: 700px; pointer-events: none; }

  /* ─── SCOREBOARD ─────────────────────────── */
  #scoreboard {
    position: absolute; top: 0; left: 0; right: 0; 
    height: 140px; 
    background: linear-gradient(180deg, #070d12 0%, #030608 100%);
    border-bottom: 1px solid var(--border);
    display: none; align-items: center; justify-content: space-between;
    padding: 15px 20px 10px 20px; z-index: 5;
  }

  .team-block { display: flex; flex-direction: column; align-items: center; width: 140px; } 
  
  .logo-wrap {
    position: relative; 
    width: 80px; height: 80px; 
    border-radius: 50%; display: flex; justify-content: center; align-items: center;
    margin-bottom: 5px; overflow: hidden;
  }
  .logo-wrap::before {
    content: ''; position: absolute; width: 150%; height: 150%;
    background: conic-gradient(from 0deg, transparent 70%, var(--glow-color) 100%);
    animation: spinGlow 1.5s linear infinite; z-index: 0;
  }
  .logo-wrap::after {
    content: ''; position: absolute; inset: 3px; 
    background: #050a0f; border-radius: 50%; z-index: 0;
  }
  @keyframes spinGlow { 100% { transform: rotate(360deg); } }

  .team-logo { 
      width: 60px; height: 60px; 
      object-fit: contain; z-index: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,1)); 
  }
  
  .team-name { 
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 18px; 
      color: #ffffff; 
      letter-spacing: 1px; 
      text-transform: uppercase; 
      white-space: nowrap;
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
      width: 100%; text-align: center; overflow: hidden; text-overflow: ellipsis; 
  }
  
  .center-block { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .score-display { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  
  /* Skor Rakamları - Koyu renklerde okunabilmesi için ince beyaz hat eklendi */
  .score-num { 
      font-family: 'Bebas Neue', sans-serif; 
      font-size: 50px; 
      line-height: 1; 
      transition: transform 0.15s; 
      -webkit-text-stroke: 1px rgba(255,255,255,0.6);

  .score-colon { font-family: 'Bebas Neue', sans-serif; font-size: 35px; color: #555; padding-bottom: 5px; }
  .score-bump { transform: scale(1.4) !important; }

  .ball-timer {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0, 255, 102, 0.08); border: 1px solid rgba(0, 255, 102, 0.4);
    padding: 4px 14px; border-radius: 20px;
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 800; color: var(--neon-green);

  }
  .ball-timer .dot { width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 6px var(--neon-green); }

  /* ─── 3-2-1 GERİ SAYIM EKRANI ─────────────────────────── */
  #countdown-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; pointer-events: none;
  }
  #countdown-text {
    font-family: 'Bebas Neue', sans-serif; font-size: 150px; color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 5px 15px rgba(0,0,0,1);
    opacity: 0; transform: scale(0.5);
  }
  @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0; transform: scale(2); } }
  @keyframes popInFinal { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1.2); } 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.5); filter: blur(10px); } }

// ─── SES SİSTEMİ VE MOBİL KİLİT KIRICI (WAKELOCK) ──────────────────────
let audioCtx;
function initAudio() {
    if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }

    const audioEl = document.getElementById('audio-goal');
    audioEl.muted = true; 
    
    if(currentTeamA && currentTeamA.muzik) {
        audioEl.src = currentTeamA.muzik; 
    }
    
    let playPromise = audioEl.play();
    if (playPromise !== undefined) {
        playPromise.then(() => {
            audioEl.pause(); 
            audioEl.currentTime = 0; 
            audioEl.muted = false; 
        }).catch(e => {
            console.log("Mobil ses kilidi kırılamadı:", e);
        });
    }
}

function playBounceSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.type = 'sine'; 
    osc.frequency.setValueAtTime(500, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05);
    
    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); 
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
    
    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
}

let goalTimeout;
function playGoalSound(musicFile) {
    const audioEl = document.getElementById('audio-goal');
    if (musicFile) {
        audioEl.src = musicFile;
        audioEl.currentTime = 0; 
        audioEl.play().catch(e => console.log("Ses dosyası yüklenemedi:", e));
        
        clearTimeout(goalTimeout);
        goalTimeout = setTimeout(() => {
            audioEl.pause();
        }, 3000); 
    }
}

      "cpalace": { isim: "CRYSTAL PALACE", kisa: "CRY", logo: "./cpalace-logo.png", muzik: "cpalace-gol.mp3", renkAna: "#1B458F", renkIkinci: "#C4122E", kazandiYazisi: "🦅 CRYSTAL PALACE KAZANDI!" },

      "strasbourg": { isim: "STRASBOURG", kisa: "STR", logo: "./strasbourg-logo.png", muzik: "strasbourg-gol.mp3", renkAna: "#00529F", renkIkinci: "#FFFFFF", kazandiYazisi: "🔵⚪ STRASBOURG KAZANDI!" }

let currentTeamA, currentTeamB;
let engine = null, render = null, runner = null, world = null;
let scoreA = 0, scoreB = 0, ballsLeft = 10, activeBalls = [], gameStarted = false;

// ─── ARAYÜZ (DROPDOWNS) ───────────────────────────────
function populateLeagueSelect() {
  const sel = document.getElementById('league-select'); sel.innerHTML = '';
  for (const [key, lig] of Object.entries(LIGLER)) {
    const opt = document.createElement('option'); opt.value = key; opt.text = lig.isim; sel.appendChild(opt);
  }
  updateTeamsDropdown();
}

function updateTeamsDropdown() {
  const key = document.getElementById('league-select').value;
  const selA = document.getElementById('team-a-select'), selB = document.getElementById('team-b-select');
  selA.innerHTML = ''; selB.innerHTML = ''; let i = 0;
  for (const [k, t] of Object.entries(LIGLER[key].takimlar)) {
    const oA = document.createElement('option'); oA.value = k; oA.text = t.isim; if (i===0) oA.selected = true; selA.appendChild(oA);
    const oB = document.createElement('option'); oB.value = k; oB.text = t.isim; if (i===1) oB.selected = true; selB.appendChild(oB);
    i++;
  }
}

// ─── GERİ SAYIM VE OTOMATİK BAŞLANGIÇ ──────────────────────────
function applyTeamsAndStartCountdown() {
  const lig = document.getElementById('league-select').value;
  currentTeamA = LIGLER[lig].takimlar[document.getElementById('team-a-select').value];
  currentTeamB = LIGLER[lig].takimlar[document.getElementById('team-b-select').value];

  initAudio(); 

  document.getElementById('label-a').innerText = currentTeamA.isim; 
  document.getElementById('logo-a').src = currentTeamA.logo || '';
  document.getElementById('logo-wrap-a').style.setProperty('--glow-color', currentTeamA.renkAna);
  
  // Skor renklerini İKİNCİ RENK olarak ayarla (JS üzerinden dinamik)
  const scoreA_el = document.getElementById('score-a');
  scoreA_el.style.color = currentTeamA.renkIkinci;
  scoreA_el.style.textShadow = `0 0 15px ${currentTeamA.renkIkinci}`;
  
  document.getElementById('label-b').innerText = currentTeamB.isim; 
  document.getElementById('logo-b').src = currentTeamB.logo || '';
  document.getElementById('logo-wrap-b').style.setProperty('--glow-color', currentTeamB.renkAna);

  const scoreB_el = document.getElementById('score-b');
  scoreB_el.style.color = currentTeamB.renkIkinci;
  scoreB_el.style.textShadow = `0 0 15px ${currentTeamB.renkIkinci}`;

  document.getElementById('setup-modal').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'flex';
  
  initGameEngine();

  const overlay = document.getElementById('countdown-overlay');
  const text = document.getElementById('countdown-text');
  overlay.style.display = 'flex';
  
  let count = 3;
  text.innerText = count;
  text.style.animation = 'none'; void text.offsetWidth; 
  text.style.animation = 'popIn 1s ease-in-out forwards';

  const timer = setInterval(() => {
      count--;
      if (count > 0) {
          text.innerText = count;
          text.style.animation = 'none'; void text.offsetWidth;
          text.style.animation = 'popIn 1s ease-in-out forwards';
      } else if (count === 0) {
          text.innerText = "BAŞLA!";
          text.style.animation = 'none'; void text.offsetWidth;
          text.style.animation = 'popInFinal 1s ease-in-out forwards';
      } else {
          clearInterval(timer);
          overlay.style.display = 'none';
          gameStarted = true;
          dropBall(); 
      }
  }, 1000);
}

function showSetupModal() {
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'none';
  document.getElementById('setup-modal').style.display = 'flex';
  if (engine) {
    Matter.Render.stop(render); Matter.Runner.stop(runner);
    Matter.World.clear(engine.world); Matter.Engine.clear(engine);
    engine = null;
  }
  const ctx = document.getElementById('game-canvas').getContext('2d');
  ctx.clearRect(0, 0, W, H);
}

// ─── OYUN MOTORU ───
function initGameEngine() {
  scoreA = 0; scoreB = 0; ballsLeft = 10; gameStarted = false; activeBalls = [];
  document.getElementById('score-a').innerText = '0';
  document.getElementById('score-b').innerText = '0';
  document.getElementById('ball-count').innerText = '10';

  engine = Matter.Engine.create({ gravity: { y: 1.6 } }); 
  world = engine.world;

  render = Matter.Render.create({
    canvas: document.getElementById('game-canvas'), engine: engine,
    options: { width: W, height: H, wireframes: false, background: 'transparent' }
  });

  runner = Matter.Runner.create();
  Matter.Events.on(render, 'beforeRender', drawFieldBackground);
  Matter.Events.on(render, 'afterRender', drawForeground);

  buildScene();
  setupCollisions();

  Matter.Runner.run(runner, engine);
  Matter.Render.run(render);
}

function buildScene() {
  const { Bodies, World } = Matter;

  World.add(world, [
    Bodies.rectangle(W/2, H+50, W, 100, { isStatic: true, render: { fillStyle: 'transparent' }, label: 'ground' }),
    Bodies.rectangle(-10, H/2, 20, H, { isStatic: true, friction: 0, restitution: 0.8 }), 
    Bodies.rectangle(W+10, H/2, 20, H, { isStatic: true, friction: 0, restitution: 0.8 })
  ]);

  const binW = W / 5;
  for (let i = 1; i < 5; i++) {
    World.add(world, Bodies.rectangle(i * binW, H - 55, 4, 110, {
      isStatic: true, restitution: 0.2, render: { fillStyle: 'rgba(255,255,255,0.7)', lineWidth: 1 }, label: 'divider'
    }));
  }

  const binLabels = ['aut-l', 'goal-a', 'aut-m', 'goal-b', 'aut-r'];
  for (let i = 0; i < 5; i++) {
    World.add(world, Bodies.rectangle((i + 0.5) * binW, H - 8, binW - 6, 16, {
      isStatic: true, isSensor: true, render: { fillStyle: 'transparent' }, label: binLabels[i]
    }));
  }

  const rows = 9, cols = 7, pegR = 6;
  const startY = PLINKO_TOP + 40, endY = PLINKO_BOTTOM - 20;
  const stepY = (endY - startY) / (rows - 1), stepX = (W - 60) / (cols - 1);

  for (let r = 0; r < rows; r++) {
    const isOdd = r % 2 === 1;
    const count = isOdd ? cols - 1 : cols;
    const offsetX = isOdd ? 30 + stepX/2 : 30;
    const y = startY + r * stepY;
    for (let c = 0; c < count; c++) {
      World.add(world, Bodies.circle(offsetX + c * stepX, y, pegR, {
        isStatic: true, restitution: 0.6, friction: 0, frictionStatic: 0, 
        render: { fillStyle: '#fff' }, label: 'peg'
      }));
    }
  }
}

// ─── ÇARPIŞMALAR VE OTOMATİK DÖNGÜ ──
function setupCollisions() {
  
  Matter.Events.on(engine, 'beforeUpdate', function() {
      activeBalls.forEach(ball => {
          if (ball.position.x < 20) {
              Matter.Body.applyForce(ball, ball.position, { x: 0.005, y: -0.002 });
          } else if (ball.position.x > W - 20) {
              Matter.Body.applyForce(ball, ball.position, { x: -0.005, y: -0.002 });
          }
          else if (Math.abs(ball.velocity.x) < 0.1 && Math.abs(ball.velocity.y) < 0.1) {
              Matter.Body.applyForce(ball, ball.position, { x: (Math.random() - 0.5) * 0.003, y: -0.002 });
          }
      });
  });

  Matter.Events.on(engine, 'collisionStart', (event) => {
    let bounced = false; 

    event.pairs.forEach(({ bodyA, bodyB }) => {
      const ball = bodyA.label === 'ball' ? bodyA : bodyB.label === 'ball' ? bodyB : null;
      const sensor = [bodyA, bodyB].find(b => b.label?.startsWith('goal') || b.label?.startsWith('aut'));
      
      if (ball && !ball.isScored) {
          const other = ball === bodyA ? bodyB : bodyA;
          if (other.label === 'peg' || other.label === 'divider') {
              bounced = true;
          }
      }

      if (ball && sensor && !ball.isScored) {
        ball.isScored = true;
        const bx = ball.position.x, by = ball.position.y;

        if (sensor.label === 'goal-a') {
          scoreA++; updateScore('score-a'); 
          showFlash(bx, by - 60, 'GOL! ⚽'); 
          spawnConfetti(bx, by, currentTeamA.renkAna, currentTeamA.renkIkinci);
          playGoalSound(currentTeamA.muzik); 
        } else if (sensor.label === 'goal-b') {
          scoreB++; updateScore('score-b'); 
          showFlash(bx, by - 60, 'GOL! ⚽'); 
          spawnConfetti(bx, by, currentTeamB.renkAna, currentTeamB.renkIkinci);
          playGoalSound(currentTeamB.muzik); 
        } else {
          showFlash(bx, by - 60, 'AUT ❌');
        }

        setTimeout(() => {
          Matter.World.remove(world, ball);
          activeBalls = activeBalls.filter(b => b !== ball);
          
          if (ballsLeft > 0) {
             setTimeout(dropBall, 600); 
          } else {
             setTimeout(checkGameOver, 1500);
          }
        }, 300);
      }
    });

    if(bounced) playBounceSound(); 
  });
}

// ─── OTOMATİK TOP ATICI ───────────────────────────────────────
function dropBall() {
  if (ballsLeft <= 0) return;
  const dropX = 40 + Math.random() * (W - 80); 
  const ball = Matter.Bodies.circle(dropX, PLINKO_TOP - 20, 14, {
    restitution: 0.75, friction: 0, frictionAir: 0.015, density: 0.005,
    render: { fillStyle: 'transparent', strokeStyle: 'transparent' }, label: 'ball'
  });

  Matter.Body.setVelocity(ball, { x: (Math.random() - 0.5) * 3, y: 0 });
  Matter.World.add(world, ball);
  activeBalls.push(ball);

  ballsLeft--;
  document.getElementById('ball-count').textContent = ballsLeft;
}

// ─── UI EFEKTLERİ ─────────────────────────────────────
function updateScore(elemId) {
  document.getElementById('score-a').textContent = scoreA; document.getElementById('score-b').textContent = scoreB;
  const el = document.getElementById(elemId);
  el.classList.add('score-bump'); setTimeout(() => el.classList.remove('score-bump'), 200);
}

function showFlash(x, y, text) {
  const el = document.createElement('div'); el.className = 'score-flash'; el.textContent = text;
  el.style.left = (x - 60) + 'px'; el.style.top = y + 'px'; el.style.width = '120px';
  document.getElementById('ui-layer').appendChild(el); setTimeout(() => el.remove(), 1200);
}

function spawnConfetti(x, y, c1, c2) {
  for (let i = 0; i < 25; i++) {
    const p = Matter.Bodies.circle(x, y, Math.random() * 3 + 2, {
      restitution: 0.8, frictionAir: 0.03, render: { fillStyle: Math.random() > 0.5 ? c1 : c2 }, collisionFilter: { group: -1 }
    });
    Matter.Body.setVelocity(p, { x: (Math.random() - 0.5) * 18, y: -Math.random() * 15 - 5 });
    Matter.World.add(world, p); setTimeout(() => Matter.World.remove(world, p), 2000);
  }
}

function checkGameOver() {
  document.getElementById('go-label-a').textContent = currentTeamA.isim;
  document.getElementById('go-label-b').textContent = currentTeamB.isim;
  document.getElementById('go-score-a').textContent = scoreA;
  document.getElementById('go-score-b').textContent = scoreB;
  
  const sA = document.getElementById('go-score-a'), sB = document.getElementById('go-score-b');
  sA.classList.remove('winner'); sB.classList.remove('winner');

  let res = '';
  if (scoreA > scoreB) { res = currentTeamA.kazandiYazisi; sA.classList.add('winner'); }
  else if (scoreB > scoreA) { res = currentTeamB.kazandiYazisi; sB.classList.add('winner'); }
  else { res = `🤝 BERABERE!`; }

  document.getElementById('result-text').textContent = res;
  document.getElementById('game-over').style.display = 'block';
}

// ─── ÇİZİMLER ─────────────────────────────
function drawFieldBackground() {
  const ctx = render.context; if (!ctx) return;
  ctx.save(); ctx.clearRect(0, 0, W, H);

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#061709'); grad.addColorStop(0.5, '#0d3615'); grad.addColorStop(1, '#061709');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let y = PLINKO_TOP; y < H; y += 60) ctx.fillRect(0, y, W, 30);

  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(W/2, H/2 + 30, 70, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([10, 10]); ctx.beginPath(); ctx.moveTo(W/2, PLINKO_TOP); ctx.lineTo(W/2, PLINKO_BOTTOM); ctx.stroke(); ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(W/2, PLINKO_BOTTOM, 90, Math.PI, 0); ctx.stroke();

  const binTop = PLINKO_BOTTOM;
  const binW = W / 5;
  
  ctx.fillStyle = 'rgba(20,20,20,0.85)';
  ctx.fillRect(0, binTop, binW, 110); 
  ctx.fillRect(binW*2, binTop, binW, 110); 
  ctx.fillRect(binW*4, binTop, binW, 110);

  const gA = ctx.createLinearGradient(binW, binTop, binW*2, binTop);
  gA.addColorStop(0, currentTeamA.renkAna); gA.addColorStop(1, currentTeamA.renkIkinci);
  ctx.fillStyle = gA; ctx.fillRect(binW, binTop, binW, 110);

  const gB = ctx.createLinearGradient(binW*3, binTop, binW*4, binTop);
  gB.addColorStop(0, currentTeamB.renkAna); gB.addColorStop(1, currentTeamB.renkIkinci);
  ctx.fillStyle = gB; ctx.fillRect(binW*3, binTop, binW, 110);

  ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0, 0, W, PLINKO_TOP);
  ctx.restore();
}

function drawForeground() {
  const ctx = render.context; if (!ctx) return;
  ctx.save();
  
  const pegs = Matter.Composite.allBodies(world).filter(b => b.label === 'peg');
  pegs.forEach(p => {
     ctx.beginPath(); ctx.arc(p.position.x, p.position.y, 10, 0, Math.PI*2);
     ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill(); 
  });

  const binTop = PLINKO_BOTTOM;
  const binW = W / 5;

  ctx.font = '800 14px "Rajdhani"'; ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.textAlign = 'center';
  ctx.fillText('AUT', binW*0.5, binTop + 55); 
  ctx.fillText('AUT', binW*2.5, binTop + 55); 
  ctx.fillText('AUT', binW*4.5, binTop + 55);

  ctx.font = '900 24px "Bebas Neue"';
  
  ctx.lineWidth = 3; ctx.strokeStyle = '#000'; ctx.strokeText(currentTeamA.kisa, binW*1.5, binTop + 45);
  ctx.fillStyle = '#fff'; ctx.fillText(currentTeamA.kisa, binW*1.5, binTop + 45);
  ctx.font = '24px serif'; ctx.fillText('🥅', binW*1.5, binTop + 80);

  ctx.font = '900 24px "Bebas Neue"';
  ctx.lineWidth = 3; ctx.strokeStyle = '#000'; ctx.strokeText(currentTeamB.kisa, binW*3.5, binTop + 45);
  ctx.fillStyle = '#fff'; ctx.fillText(currentTeamB.kisa, binW*3.5, binTop + 45);
  ctx.font = '24px serif'; ctx.fillText('🥅', binW*3.5, binTop + 80);

  activeBalls.forEach(ball => {
      ctx.save();
      ctx.translate(ball.position.x, ball.position.y); ctx.rotate(ball.angle);
      const r = ball.circleRadius; 

      ctx.shadowColor = 'rgba(255,255,255,0.8)'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, 2 * Math.PI);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1.5; ctx.strokeStyle = '#000'; ctx.stroke();

      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
          const angle = i * 2 * Math.PI / 5 - Math.PI / 2;
          const px = Math.cos(angle) * (r * 0.4); const py = Math.sin(angle) * (r * 0.4);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fillStyle = '#111'; ctx.fill();

      for (let i = 0; i < 5; i++) {
          const angle = i * 2 * Math.PI / 5 - Math.PI / 2;
          const px1 = Math.cos(angle) * (r * 0.4); const py1 = Math.sin(angle) * (r * 0.4);
          const px2 = Math.cos(angle) * r; const py2 = Math.sin(angle) * r;
          ctx.beginPath(); ctx.moveTo(px1, py1); ctx.lineTo(px2, py2); ctx.stroke();
      }
      ctx.restore();
  });

  ctx.restore();
}

populateLeagueSelect();
